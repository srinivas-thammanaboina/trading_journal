<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e1e2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{% block title %}Trading Journal{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="/static/css/style.css?v=9">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-text">Lottoman<br>Trade Bot</div>
                <div class="logo-sub">Bot / Performance OS</div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item {{ 'active' if active_page == 'dashboard' }}">Overview</a>
                <a href="/trades" class="nav-item {{ 'active' if active_page == 'trades' }}">Trades</a>
                <a href="/alerts" class="nav-item {{ 'active' if active_page == 'alerts' }}">Alert Pipeline</a>
                <a href="/analytics" class="nav-item {{ 'active' if active_page == 'analytics' }}">Analytics</a>
                <a href="/guru" class="nav-item {{ 'active' if active_page == 'guru' }}">Guru Board</a>
                <a href="/health" class="nav-item {{ 'active' if active_page == 'health' }}">Risk & Health</a>
                <a href="/broker-metrics" class="nav-item {{ 'active' if active_page == 'broker_metrics' }}">Broker Metrics</a>
            </nav>
            <div class="sidebar-footer">
                <div class="mode-badge">PAPER MODE</div>
                <a href="/logout" class="logout-link">Logout</a>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content">
            <div id="market-status" class="market-status-badge"></div>
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/js/charts.js"></script>
    <script>
    function updateMarketStatus() {
        const badge = document.getElementById('market-status');
        if (!badge) return;

        // Get current ET time
        const now = new Date();
        const etStr = now.toLocaleString('en-US', { timeZone: 'America/New_York' });
        const et = new Date(etStr);
        const day = et.getDay(); // 0=Sun, 6=Sat
        const h = et.getHours();
        const m = et.getMinutes();
        const mins = h * 60 + m;

        const OPEN = 9 * 60 + 30;   // 9:30
        const CLOSE = 16 * 60;       // 4:00 PM
        const PRE = 9 * 60;          // 9:00 AM

        if (day === 0 || day === 6) {
            badge.textContent = 'Market Closed';
            badge.className = 'market-status-badge closed';
        } else if (mins < PRE) {
            badge.textContent = 'Pre-market';
            badge.className = 'market-status-badge closed';
        } else if (mins < OPEN) {
            const left = OPEN - mins;
            badge.textContent = 'Opens in ' + left + 'm';
            badge.className = 'market-status-badge closing';
        } else if (mins < CLOSE) {
            const left = CLOSE - mins;
            const hrs = Math.floor(left / 60);
            const mn = left % 60;
            let label = 'Closes in ';
            if (hrs > 0) label += hrs + 'h ' + mn + 'm';
            else label += mn + 'm';

            badge.textContent = label;
            if (left <= 15) {
                badge.className = 'market-status-badge urgent';
            } else if (left <= 60) {
                badge.className = 'market-status-badge closing';
            } else {
                badge.className = 'market-status-badge open';
            }
        } else {
            badge.textContent = 'Market Closed';
            badge.className = 'market-status-badge closed';
        }
    }
    updateMarketStatus();
    setInterval(updateMarketStatus, 30000); // update every 30s
    </script>
    {% block scripts %}{% endblock %}
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }
    </script>
</body>
</html>
